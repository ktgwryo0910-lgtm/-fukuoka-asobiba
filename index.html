<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>福岡市 子供の遊び場所検索</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #faf8f5;
    --card-bg: #ffffff;
    --text: #2b2b2b;
    --sub: #6b6b6b;
    --accent: #e8734a;
    --accent-soft: #fdece4;
    --border: #e5e0d8;
    --badge-visited: #2f8f5b;
    --badge-visited-bg: #e4f5ea;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1a18;
      --card-bg: #26241f;
      --text: #f1ede6;
      --sub: #b3ada2;
      --accent: #ff9068;
      --accent-soft: #3a2a22;
      --border: #3a362f;
      --badge-visited: #7bd9a0;
      --badge-visited-bg: #1f3a2b;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  header {
    padding: 24px 20px 12px;
    max-width: 1000px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.5rem;
    margin: 0 0 4px;
  }
  header p {
    color: var(--sub);
    margin: 0;
    font-size: 0.92rem;
  }
  .filters {
    max-width: 1000px;
    margin: 0 auto;
    padding: 16px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }
  .filters select, .filters label {
    font-size: 0.9rem;
  }
  .filters select {
    padding: 6px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
  }
  .filters label {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--sub);
    cursor: pointer;
  }
  .count {
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 20px;
    color: var(--sub);
    font-size: 0.85rem;
  }
  .grid {
    max-width: 1000px;
    margin: 12px auto 40px;
    padding: 0 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
  }
  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .card h2 {
    font-size: 1.02rem;
    margin: 0 0 6px;
  }
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .tag {
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
    white-space: nowrap;
  }
  .tag.visited {
    background: var(--badge-visited-bg);
    color: var(--badge-visited);
    font-weight: bold;
  }
  dl {
    margin: 0;
    font-size: 0.85rem;
  }
  dl div {
    display: flex;
    gap: 8px;
    padding: 4px 0;
    border-top: 1px solid var(--border);
  }
  dl div:first-child { border-top: none; }
  dt {
    flex: 0 0 88px;
    color: var(--sub);
  }
  dd {
    margin: 0;
    flex: 1;
  }
  .memo {
    margin-top: 10px;
    font-size: 0.82rem;
    color: var(--sub);
  }
  footer {
    max-width: 1000px;
    margin: 0 auto;
    padding: 20px;
    color: var(--sub);
    font-size: 0.78rem;
  }
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--sub);
    padding: 40px 0;
  }
  .ad-slot {
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 20px;
  }
  .ad-slot .ad-box {
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
    color: var(--sub);
    font-size: 0.78rem;
  }
  .aff-link {
    display: inline-block;
    margin-top: 8px;
    font-size: 0.78rem;
    color: var(--accent);
    text-decoration: none;
    border: 1px solid var(--accent);
    border-radius: 999px;
    padding: 3px 10px;
  }
  .aff-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<header>
  <h1>福岡市 子供の遊び場所検索</h1>
  <p>未就学児(3〜6歳)の親向け。福岡市7区の遊び場を条件で絞り込めます。(プロトタイプ・データ収集中)</p>
</header>

<div class="filters">
  <select id="f-ward">
    <option value="">区: すべて</option>
  </select>
  <select id="f-type">
    <option value="">屋内外: すべて</option>
    <option value="屋内">屋内</option>
    <option value="屋外">屋外</option>
  </select>
  <label><input type="checkbox" id="f-free"> 無料のみ</label>
  <label><input type="checkbox" id="f-visited"> オーナー実地取材済みのみ</label>
</div>

<!-- 広告枠: Googleアドセンス審査通過後、ここに広告コードを設置する -->
<div class="ad-slot"><div class="ad-box">広告枠(Googleアドセンス設定後に表示)</div></div>

<div class="count" id="count"></div>
<div class="grid" id="grid"></div>

<!-- 広告枠: 記事下にも1枠 -->

<footer>

</footer>

  {ward:"中央区", name:"BOSS E・ZO FUKUOKA", address:"PayPayドーム隣接", type:"屋内", rain:true, age:"未就学児には不向き(全年齢施設だがアトラクション中心)", fee:"アトラクション個別課金制(例:V-World 4-12歳2時間1700-1800円、すべZO1000円等。未就学児が対象年齢のアトラクションは少ない)", parking:"専用駐車場なし・みずほPayPayドーム駐車場を利用(通常日は最初1h300円/以降150円、野球等イベント日は1日3000円上限、館内利用額に応じ割引・無料化あり)", crowd:"土日祝", source:"自分取材", visited:true, memo:"未就学児が遊べるスペースがほぼなく物足りなかった。特に強い思い出もない。無料で遊ばせられるスペースがあったかどうか記憶が曖昧", items:"子供用 耳栓"},
  {ward:"中央区", name:"大濠公園", address:"中央区大濠公園", type:"屋外", rain:false, age:"全年齢", fee:"無料(駐車場代は安め)", parking:"あり(安め)", crowd:"常に人が多い", source:"自分取材", visited:true, memo:"遊具が多く公園も広い。景色がリニューアルされて綺麗(夜も良い)。飲食は近くのドーナツ屋か高めのカフェ程度。外国人観光客も多く賑わっている", items:"レジャーシート"},
  {ward:"南区", name:"おおはし子どもプラザ", address:"南区塩原2-8-2(南市民センター1階)", type:"屋内", rain:true, age:"未就学児", fee:"無料", parking:"南市民センター等共用駐車場(土日祝・イベント時混雑、利用者は受付で駐車券処理が必要)", crowd:"土日祝", source:"公式(福岡市)", visited:false, memo:"利用時間9-18時、休館日は月曜(祝日は翌平日)・年末年始", items:"抱っこひも"},
  {ward:"南区", name:"ひばる子どもプラザ(ひつじのおうち)", address:"南区桧原2-36-15", type:"屋内", rain:true, age:"未就学児", fee:"無料", parking:"敷地内約8台(道が狭いので注意)", crowd:"情報なし(未確認。一般的に長期休み・雨天時は混みやすい傾向)", source:"公式(福岡市)", visited:false, memo:"利用時間 月〜土10-16時、休館日は日曜・第1土曜・年末年始(12/29-1/3)", items:"抱っこひも"},
  {ward:"城南区", name:"鳥飼子どもプラザ", address:"城南区鳥飼5-2-25(城南保健福祉センター2階)", type:"屋内", rain:true, age:"未就学児", fee:"無料", parking:"90分無料(城南区役所別館駐車場)", crowd:"情報なし(未確認。一般的に長期休み・雨天時は混みやすい傾向)", source:"公式(福岡市)", visited:false, memo:"利用時間 日〜金10-16時(ランチタイム11-13時は休み)、休館日は土曜・毎月最終月曜・年末年始", items:"抱っこひも"},

// アフィリエイトタグ未登録のため、現在はAmazon通常検索リンク(無料)。
// Amazonアソシエイト登録後は tag=あなたのID を付与すること
const AMAZON_ASSOCIATE_TAG = ""; // 例: "yourtag-22"
function affiliateUrl(keyword) {
  const base = `https://www.amazon.co.jp/s?k=${encodeURIComponent(keyword)}`;
  return AMAZON_ASSOCIATE_TAG ? `${base}&tag=${AMAZON_ASSOCIATE_TAG}` : base;
}

const wardSelect = document.getElementById("f-ward");
const wards = [...new Set(spots.map(s => s.ward))];
wards.forEach(w => {
  const opt = document.createElement("option");
  opt.value = w; opt.textContent = w;
  wardSelect.appendChild(opt);
});

function isFree(fee) {
  return fee.startsWith("無料");
}

function render() {
  const ward = document.getElementById("f-ward").value;
  const type = document.getElementById("f-type").value;
  const freeOnly = document.getElementById("f-free").checked;
  const visitedOnly = document.getElementById("f-visited").checked;

  const filtered = spots.filter(s => {
    if (ward && s.ward !== ward) return false;
    if (type && s.type !== type) return false;
    if (freeOnly && !isFree(s.fee)) return false;
    if (visitedOnly && !s.visited) return false;
    return true;
  });

  document.getElementById("count").textContent = `${filtered.length} / ${spots.length} 件表示中`;

  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">条件に合うスポットが見つかりませんでした</div>';
    return;
  }
  filtered.forEach(s => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="card-head"><h2>${s.name}</h2></div>
      <div class="tags">
        <span class="tag">${s.ward}</span>
        <span class="tag">${s.type}</span>
        ${s.rain ? '<span class="tag">雨天OK</span>' : ''}
        ${s.visited ? '<span class="tag visited">オーナー実地取材済み</span>' : ''}
      </div>
      <dl>
        <div><dt>住所</dt><dd>${s.address}</dd></div>
        <div><dt>対象年齢</dt><dd>${s.age}</dd></div>
        <div><dt>料金</dt><dd>${s.fee}</dd></div>
        <div><dt>駐車場</dt><dd>${s.parking}</dd></div>
        <div><dt>混雑時間帯</dt><dd>${s.crowd}</dd></div>
      </dl>
      <div class="memo">${s.memo}</div>
      <a class="aff-link" href="${affiliateUrl(s.items)}" target="_blank" rel="noopener nofollow sponsored">関連グッズ「${s.items}」を見る</a>
    `;
    grid.appendChild(card);
  });
}

["f-ward","f-type"].forEach(id => document.getElementById(id).addEventListener("change", render));
["f-free","f-visited"].forEach(id => document.getElementById(id).addEventListener("change", render));

render();
</script>
</body>
</html>
